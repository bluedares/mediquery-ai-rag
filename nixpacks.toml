[providers]
python = "3.11"

[phases.setup]
nixPkgs = ["gcc", "curl"]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements-minimal.txt"
]

[start]
cmd = "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"

[variables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
