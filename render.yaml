services:
  # Backend Service
  # Updated: 2026-03-06 - Force config reload with correct PYTHONPATH
  - type: web
    name: mediquery-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install --upgrade pip && pip install -r requirements-minimal.txt"
    startCommand: "PYTHONPATH=/opt/render/project/src:$PYTHONPATH uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: USE_DIRECT_ANTHROPIC
        value: "true"
      - key: USE_CHROMADB
        value: "true"
      - key: CHROMADB_PERSIST_DIRECTORY
        value: "./chroma_data"
      - key: AWS_REGION
        value: "us-east-1"
      - key: S3_BUCKET_NAME
        value: "mediquery-documents"
      - key: OPENSEARCH_ENDPOINT
        value: ""

  # Frontend Service
  - type: web
    name: mediquery-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
